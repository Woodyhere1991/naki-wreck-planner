<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#101820">
  <title>Nakiwhiteware Ops Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: #0d1117;
      color: #eef3f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    main {
      width: min(420px, 100%);
      border: 1px solid #2b3847;
      border-radius: 8px;
      padding: 22px;
      background: #121922;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
    }
    .mark {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(53, 201, 111, 0.55);
      border-radius: 8px;
      background: #0f2419;
      color: #35c96f;
      font-weight: 850;
    }
    h1 { margin: 14px 0 6px; font-size: 24px; }
    p { margin: 0 0 18px; color: #97a8ba; line-height: 1.45; }
    label { display: block; color: #97a8ba; font-weight: 750; }
    input {
      width: 100%;
      min-height: 48px;
      margin-top: 7px;
      border: 1px solid #2b3847;
      border-radius: 8px;
      padding: 10px 12px;
      background: #0b1118;
      color: #eef3f8;
      font: inherit;
    }
    button {
      width: 100%;
      min-height: 48px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: #35c96f;
      color: #08110c;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }
    .error { color: #ffb3b3; margin-top: 10px; }
  </style>
</head>
<body>
  <main>
    <div class="mark">NW</div>
    <h1>Nakiwhiteware Ops</h1>
    <p>Enter the app passcode to open pickup routes and customer details.</p>
    <form method="post">
      <label>Passcode
        <input name="pin" type="password" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
      </label>
      <button type="submit">Open app</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
  </main>
</body>
</html>
